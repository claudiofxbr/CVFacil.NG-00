version: '3.8'

# Postgres local removido: o banco de dados de produção e desenvolvimento é o Neon
# (variável DATABASE_URL / DIRECT_URL em .env.local). Este compose serve só para
# subir dependências locais que não têm equivalente em nuvem — hoje, o Redis do BullMQ.

services:
  app:
    build: .
    container_name: cvfacil-app
    ports:
      - "3001:3000"
    env_file:
      - .env.local
    environment:
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      # Sobrescreve os valores de dev do .env.local (localhost:6300): dentro da
      # rede do compose, o Redis é acessível pelo nome do serviço, porta padrão.
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: cvfacil-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

volumes:
  redis-data:
