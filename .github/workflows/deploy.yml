name: Build e publica imagem Docker do CVFacil.NG

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/claudiofxbr/cvfacil.ng:latest
            ghcr.io/claudiofxbr/cvfacil.ng:${{ github.sha }}

# Após o push, a imagem fica em ghcr.io/claudiofxbr/cvfacil.ng:latest.
# No EasyPanel (mesmo painel já usado para portalcursos e prd-gra.ng nesta VPS),
# crie um novo App apontando para essa imagem, configure o domínio cvfacil.ng
# e as variáveis de ambiente de produção (mesmas do .env.local documentado
# em DEPLOY.md). O Traefik do EasyPanel cuida do roteamento/HTTPS automaticamente.
