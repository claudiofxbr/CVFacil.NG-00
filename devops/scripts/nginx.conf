# Configuração Nginx Profissional - PortalCursos.NG
# Localização recomendada: /etc/nginx/sites-available/portalcursos

server {
    listen 80;
    server_name portalcursos.seu-dominio.com; # ALTE PARA SEU DOMÍNIO OU IP

    # Frontend (Next.js)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API Backend (Spring Boot)
    location /api {
        proxy_pass http://localhost:8080/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Otimização para o banco Neon (tempo de resposta maior no cold start)
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
    }

    # Pasta de Uploads de Documentos
    location /uploads {
        alias /var/www/portalcursos/backend/uploads;
        autoindex off;
    }

    # Otimização de Assets Next.js
    location /_next/static {
        alias /var/www/portalcursos/frontend/.next/static;
        expires 365d;
        access_log off;
    }

    # Cabeçalhos de Segurança
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
}
